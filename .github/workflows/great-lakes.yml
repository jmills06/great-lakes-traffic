name: Great Lakes Vessel Collector

# Repo path: .github/workflows/great-lakes.yml

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub's floor is 5; runs can be delayed under load)
  workflow_dispatch:          # lets you run it by hand from the Actions tab

permissions:
  contents: write             # allow the job to commit the data files

concurrency:
  group: great-lakes-collector
  cancel-in-progress: false   # never interrupt a run mid-listen

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5        # well above the ~55s listen window
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install "websockets>=12"

      - name: Collect vessel data
        env:
          AISSTREAM_API_KEY: ${{ secrets.AISSTREAM_API_KEY }}
        run: python collector.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/great-lakes-vessels.json data/vessel-static-cache.json
          git diff --cached --quiet || git commit -m "chore: refresh Great Lakes vessel data"
          git push
